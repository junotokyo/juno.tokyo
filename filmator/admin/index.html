<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Filmator Admin</title>
  <style>
    :root { color-scheme: light; }
    html, body { background: #f7faf9; color: #1a2e2e; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.5rem; margin-top: 0; }
    h2 { font-size: 1.1rem; margin-top: 2rem; border-top: 1px solid #cdd9d6; padding-top: 1rem; }
    label { display: block; margin: 0.5rem 0 0.25rem; font-size: 0.9rem; }
    input[type="text"], input[type="password"], input[type="number"], input[type="date"] { padding: 0.4rem; font-size: 1rem; width: 100%; max-width: 320px; box-sizing: border-box; }
    button { padding: 0.5rem 0.9rem; font-size: 0.95rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    table { border-collapse: collapse; margin-top: 0.5rem; width: 100%; }
    th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #cdd9d6; font-size: 0.95rem; }
    .status { margin: 0.5rem 0; padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; }
    .status.error { background: #fee; color: #900; }
    .status.ok { background: #e6f7f3; color: #0d6e5c; }
    .row-actions button { margin-left: 0.3rem; }
    .code-row { cursor: pointer; }
    .code-row:hover { background: rgba(13, 148, 136, 0.08); }
    .code-row.expired td { color: #999; }
    .code-row.expired .badge-expired { display: inline-block; margin-left: 0.4rem; padding: 0 0.4rem; border-radius: 3px; background: #c33; color: #fff; font-size: 0.75rem; }
    .form-mode { font-size: 0.85rem; color: #0d9488; margin: 0.25rem 0 0.5rem; }
    .form-actions { display: flex; justify-content: space-between; align-items: center; max-width: 320px; margin-top: 0.5rem; }
    .muted { color: #6b7e7c; font-size: 0.85rem; }
    .nav { font-size: 0.9rem; margin-bottom: 1rem; }
    .nav a { color: #0d9488; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Filmator Admin</h1>
  <nav class="nav">📊 <a href="/filmator/admin/stats/">統計・エラーログを見る</a></nav>

  <section id="app">
    <h2>Promo Codes</h2>
    <table id="codeTable">
      <thead><tr><th>Code</th><th>Expires</th><th>Count</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
    <p class="muted" id="codeEmpty" hidden>登録済みコードはありません</p>

    <h2>追加・更新</h2>
    <p class="muted">既存コードの行をクリックすると下のフォームに読み込まれます。同じ Code で「登録」を押すと上書き更新になります。</p>
    <div id="formMode" class="form-mode" hidden></div>
    <label for="newCode">Code (1-8 英数字)</label>
    <input type="text" id="newCode" maxlength="8" autocapitalize="characters">
    <label for="newExpires">Expires</label>
    <input type="date" id="newExpires">
    <label for="newCount">Count</label>
    <input type="number" id="newCount" min="0" step="1" value="1">
    <div class="form-actions">
      <button id="clearBtn" type="button">クリア</button>
      <button id="addBtn">登録</button>
    </div>
    <div id="codeStatus" class="status" hidden></div>
  </section>

  <script src="./admin.js" type="module"></script>
</body>
</html>
